<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forge Drive | Professional Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        :root { --bg: #090a0f; --card: rgba(255, 255, 255, 0.03); --border: rgba(255, 255, 255, 0.08); }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #e5e7eb; }
        .glass { background: var(--card); backdrop-filter: blur(20px); border: 1px solid var(--border); }
        .nav-active { background: rgba(59, 130, 246, 0.1); color: #60a5fa; border-left: 3px solid #3b82f6; }
        .animate-card { animation: fadeIn 0.4s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .skeleton { background: linear-gradient(90deg, #16181d 25%, #1f2128 50%, #16181d 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="w-72 glass h-full flex flex-col p-6 border-r border-white/5">
        <div class="flex items-center gap-3 mb-10 px-2">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-600/30">
                <i data-lucide="folder-key" class="text-white w-6 h-6"></i>
            </div>
            <h1 class="text-xl font-bold text-white">Forge Drive</h1>
        </div>
        
        <nav class="space-y-2 flex-1">
            <p class="text-[10px] font-bold text-gray-600 uppercase tracking-widest px-4 mb-2">Dashboard</p>
            <button onclick="window.setCategory('all', this)" class="nav-btn w-full px-4 py-3 rounded-xl flex items-center gap-3 transition nav-active">
                <i data-lucide="layout-grid" class="w-5 h-5"></i> All Files
            </button>
            <p class="text-[10px] font-bold text-gray-600 uppercase tracking-widest px-4 mt-8 mb-2">Categories</p>
            <button onclick="window.setCategory('video', this)" class="nav-btn w-full px-4 py-3 rounded-xl flex items-center gap-3 text-gray-500 hover:text-white transition"><i data-lucide="play" class="w-5 h-5"></i> Videos</button>
            <button onclick="window.setCategory('audio', this)" class="nav-btn w-full px-4 py-3 rounded-xl flex items-center gap-3 text-gray-500 hover:text-white transition"><i data-lucide="music" class="w-5 h-5"></i> Audio</button>
            <button onclick="window.setCategory('image', this)" class="nav-btn w-full px-4 py-3 rounded-xl flex items-center gap-3 text-gray-500 hover:text-white transition"><i data-lucide="image" class="w-5 h-5"></i> Images</button>
            <button onclick="window.setCategory('document', this)" class="nav-btn w-full px-4 py-3 rounded-xl flex items-center gap-3 text-gray-500 hover:text-white transition"><i data-lucide="file-text" class="w-5 h-5"></i> Documents</button>
            <button onclick="window.setCategory('other', this)" class="nav-btn w-full px-4 py-3 rounded-xl flex items-center gap-3 text-gray-500 hover:text-white transition"><i data-lucide="more-horizontal" class="w-5 h-5"></i> Other</button>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col">
        <header class="h-24 flex items-center justify-between px-10">
            <h2 id="view-title" class="text-2xl font-bold text-white">All Files</h2>
            <div class="flex gap-4">
                <button onclick="window.openUrlModal()" class="px-4 py-2 rounded-xl text-sm text-gray-400 border border-white/5 hover:bg-white/5 transition">URL Upload</button>
                <input type="file" id="file-upload" class="hidden" onchange="window.handleUpload(this)">
                <button onclick="document.getElementById('file-upload').click()" class="bg-blue-600 hover:bg-blue-700 px-6 py-2.5 rounded-xl text-sm font-bold text-white shadow-lg shadow-blue-600/20 transition">+ Upload File</button>
            </div>
        </header>

        <section class="flex-1 overflow-y-auto p-10 pt-2 custom-scrollbar">
            <div id="file-grid" class="grid grid-cols-1 sm:grid-cols-3 lg:grid-cols-5 gap-6"></div>
        </section>
    </main>

    <div id="url-modal" class="fixed inset-0 z-[150] flex items-center justify-center hidden p-6">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-md" onclick="window.closeUrlModal()"></div>
        <div class="glass w-full max-w-md p-8 rounded-[2.5rem] relative animate-card border border-white/10">
            <h3 class="text-xl font-bold mb-6">Remote Upload</h3>
            <input type="text" id="remote-url-input" class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 mb-4 outline-none" placeholder="Direct link...">
            <input type="text" id="remote-name-input" class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 mb-6 outline-none" placeholder="Filename...">
            <button onclick="window.submitUrlUpload()" class="w-full bg-blue-600 py-4 rounded-2xl font-bold">Upload</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const workerUrl = 'https://vicksgoli.visdrive.workers.dev';
            let allFiles = [];
            const extMap = {
                video: ['mp4', 'mkv', 'webm', 'mov'],
                audio: ['mp3', 'wav', 'aac', 'flac', 'ogg'],
                image: ['jpg', 'jpeg', 'png', 'gif', 'webp', 'svg'],
                document: ['pdf', 'doc', 'docx', 'txt', 'zip', 'rar']
            };

            window.setCategory = (cat, btn) => {
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active', 'text-white'));
                btn.classList.add('nav-active', 'text-white');
                render(cat);
            };

            window.openUrlModal = () => document.getElementById('url-modal').classList.remove('hidden');
            window.closeUrlModal = () => document.getElementById('url-modal').classList.add('hidden');

            const render = (filter = 'all') => {
                const grid = document.getElementById('file-grid');
                const files = filter === 'all' ? allFiles : allFiles.filter(f => {
                    const ext = f.name.split('.').pop().toLowerCase();
                    if (filter === 'other') return !Object.values(extMap).flat().includes(ext);
                    return extMap[filter].includes(ext);
                });
                grid.innerHTML = files.map((f, i) => `
                    <div class="glass p-8 rounded-[2.5rem] cursor-pointer hover:border-blue-500/30 transition animate-card" style="animation-delay:${i*0.05}s">
                        <div class="aspect-square mb-6 rounded-2xl bg-white/5 flex items-center justify-center"><i data-lucide="file" class="w-10 h-10 text-gray-700"></i></div>
                        <p class="text-sm font-semibold truncate">${f.name}</p>
                    </div>`).join('');
                lucide.createIcons();
            };

            // Initial load
            const secret = localStorage.getItem('forge_secret') || prompt("Enter Secret Key:");
            localStorage.setItem('forge_secret', secret);
            fetch(`${workerUrl}/api/files`, { headers: {'Authorization': `Bearer ${secret}`} })
                .then(r => r.json())
                .then(d => { allFiles = d; render(); });

            lucide.createIcons();
        });
    </script>
</body>
</html>
