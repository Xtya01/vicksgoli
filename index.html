<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forge Drive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background: #0c0e12; color: #e5e7eb; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .sidebar-item:hover { background: rgba(59, 130, 246, 0.1); color: #60a5fa; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-in { animation: fadeIn 0.4s ease forwards; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">
    <div id="toast-container" class="fixed top-6 right-6 z-[100] flex flex-col gap-3"></div>

    <aside class="w-72 glass h-full hidden md:flex flex-col p-6">
        <div class="flex items-center gap-3 mb-10">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-900/20">
                <i data-lucide="folder-key" class="text-white"></i>
            </div>
            <h1 class="text-xl font-bold tracking-tight">Forge Drive</h1>
        </div>
        <nav class="space-y-2 flex-1">
            <div class="px-4 py-3 rounded-xl sidebar-item cursor-pointer flex items-center gap-3 text-blue-400 bg-blue-500/10">
                <i data-lucide="layout-grid" class="w-5 h-5"></i> Dashboard
            </div>
            <div class="px-4 py-3 rounded-xl sidebar-item cursor-pointer flex items-center gap-3 text-gray-400">
                <i data-lucide="video" class="w-5 h-5"></i> Family Media
            </div>
        </nav>
        <div class="glass p-4 rounded-2xl text-[10px] text-gray-500">Storage Backend: IA S3-v4</div>
    </aside>

    <main class="flex-1 flex flex-col min-w-0">
        <header class="h-20 flex items-center justify-between px-8 border-b border-white/5">
            <h2 class="text-lg font-medium text-gray-300">Shared Files</h2>
            <div class="flex items-center gap-4">
                <input type="file" id="file-upload" class="hidden" onchange="handleUpload()">
                <button onclick="document.getElementById('file-upload').click()" class="bg-blue-600 hover:bg-blue-700 px-5 py-2.5 rounded-xl flex items-center gap-2 text-sm font-semibold transition shadow-lg shadow-blue-900/20">
                    <i data-lucide="plus" class="w-4 h-4"></i> Upload File
                </button>
            </div>
        </header>

        <section class="flex-1 overflow-y-auto p-8">
            <div id="file-grid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6"></div>
        </section>
    </main>

    <div id="detail-overlay" class="fixed inset-0 z-50 glass hidden flex flex-col animate-in">
        <div class="p-6 border-b border-white/5 flex justify-between items-center">
            <button onclick="closeDetail()" class="flex items-center gap-2 text-gray-400 hover:text-white"><i data-lucide="chevron-left"></i> Back</button>
            <div id="action-bar"></div>
        </div>
        <div class="flex-1 flex flex-col items-center justify-center p-12" id="preview-area"></div>
    </div>

    <div id="auth-screen" class="fixed inset-0 z-[200] bg-[#0c0e12] flex items-center justify-center p-6">
        <div class="glass p-10 rounded-[2rem] w-full max-w-md text-center">
            <h2 class="text-2xl font-bold mb-6">Family Cloud Access</h2>
            <input type="password" id="pass-input" class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 mb-4 focus:border-blue-500 outline-none transition" placeholder="Enter Secret Key">
            <button onclick="doAuth()" class="w-full bg-blue-600 py-4 rounded-2xl font-bold">Connect Drive</button>
        </div>
    </div>

    <script>
        const workerUrl = 'https://vicksgoli.visdrive.workers.dev'; // UPDATE THIS
        let filesList = [];

        function toast(msg, type='info') {
            const c = document.getElementById('toast-container');
            const t = document.createElement('div');
            t.className = `p-4 rounded-xl glass border ${type==='error'?'border-red-500/50 text-red-400':'border-blue-500/50 text-blue-400'} shadow-2xl animate-in`;
            t.innerText = msg;
            c.appendChild(t);
            setTimeout(() => t.remove(), 4000);
        }

        async function loadFiles() {
            const secret = localStorage.getItem('family_key');
            try {
                const res = await fetch(`${workerUrl}/api/files`, { headers: {'Authorization': `Bearer ${secret}`} });
                if (res.status === 401) throw 'auth';
                filesList = await res.json();
                render();
            } catch (e) { document.getElementById('auth-screen').classList.remove('hidden'); }
        }

        function render() {
            const grid = document.getElementById('file-grid');
            grid.innerHTML = filesList.map((f, i) => `
                <div onclick="openFile(${i})" class="glass group p-5 rounded-[2rem] cursor-pointer hover:bg-white/5 transition-all duration-300 border-transparent hover:border-blue-500/30">
                    <div class="aspect-square mb-4 rounded-2xl bg-white/5 flex items-center justify-center">
                        <i data-lucide="${f.name.match(/\.(mp4|mkv|webm)$/i)?'play-circle':'file'}" class="w-12 h-12 text-gray-600 group-hover:text-blue-500"></i>
                    </div>
                    <p class="text-sm font-medium truncate text-gray-200">${f.name}</p>
                    <p class="text-[10px] text-gray-500 mt-1 uppercase">${(f.size/(1024*1024)).toFixed(2)} MB</p>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function openFile(idx) {
            const f = filesList[idx];
            const url = `${workerUrl}/api/download/${f.name}?secret=${localStorage.getItem('family_key')}`;
            const preview = document.getElementById('preview-area');
            const overlay = document.getElementById('detail-overlay');
            
            if (f.name.match(/\.(mp4|webm|mkv)$/i)) {
                preview.innerHTML = `<video src="${url}" controls class="max-h-full max-w-full rounded-2xl shadow-2xl"></video>`;
            } else {
                preview.innerHTML = `<div class="text-center"><i data-lucide="file" class="w-24 h-24 mb-4 text-gray-700"></i><p>${f.name}</p></div>`;
            }
            
            document.getElementById('action-bar').innerHTML = `<button onclick="window.open('${url}')" class="bg-blue-600 px-6 py-2 rounded-xl text-sm font-bold">Download Now</button>`;
            overlay.classList.remove('hidden');
            lucide.createIcons();
        }

        async function handleUpload() {
            const file = document.getElementById('file-upload').files[0];
            if (!file) return;
            toast(`Uploading ${file.name}...`);
            const res = await fetch(`${workerUrl}/api/upload/${file.name}`, {
                method: 'PUT',
                headers: { 'Authorization': `Bearer ${localStorage.getItem('family_key')}`, 'Content-Type': file.type },
                body: file
            });
            if (res.ok) { toast('Upload complete!', 'success'); loadFiles(); }
            else toast('Upload failed', 'error');
        }

        function closeDetail() { document.getElementById('detail-overlay').classList.add('hidden'); document.getElementById('preview-area').innerHTML = ''; }
        function doAuth() { localStorage.setItem('family_key', document.getElementById('pass-input').value); document.getElementById('auth-screen').classList.add('hidden'); loadFiles(); }
        if (localStorage.getItem('family_key')) { document.getElementById('auth-screen').classList.add('hidden'); loadFiles(); }
        lucide.createIcons();
    </script>
</body>
</html>
