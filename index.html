<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forge Drive | Family Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0c0e12; color: #e5e7eb; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .nav-active { background: rgba(59, 130, 246, 0.15); color: #60a5fa; border-left: 3px solid #3b82f6; }
        .animate-up { animation: slideUp 0.3s ease forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1f2937; border-radius: 10px; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">
    <div id="toast-container" class="fixed top-6 right-6 z-[100] flex flex-col gap-3"></div>

    <aside class="w-72 glass h-full hidden md:flex flex-col p-6 border-r border-white/5">
        <div class="flex items-center gap-3 mb-10 px-2">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-900/40">
                <i data-lucide="cloud-lightning" class="text-white w-6 h-6"></i>
            </div>
            <h1 class="text-xl font-bold tracking-tight">Forge Drive</h1>
        </div>
        
        <nav class="space-y-1 flex-1 overflow-y-auto custom-scrollbar">
            <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest ml-4 mb-3">Library</p>
            <button onclick="setCategory('all', this)" class="nav-btn w-full px-4 py-3 rounded-xl flex items-center gap-3 text-gray-400 hover:bg-white/5 transition nav-active">
                <i data-lucide="layers" class="w-4 h-4"></i> All Files
            </button>
            <button onclick="setCategory('video', this)" class="nav-btn w-full px-4 py-3 rounded-xl flex items-center gap-3 text-gray-400 hover:bg-white/5 transition">
                <i data-lucide="play" class="w-4 h-4"></i> Videos
            </button>
            <button onclick="setCategory('image', this)" class="nav-btn w-full px-4 py-3 rounded-xl flex items-center gap-3 text-gray-400 hover:bg-white/5 transition">
                <i data-lucide="image" class="w-4 h-4"></i> Images
            </button>
            <button onclick="setCategory('document', this)" class="nav-btn w-full px-4 py-3 rounded-xl flex items-center gap-3 text-gray-400 hover:bg-white/5 transition">
                <i data-lucide="file-text" class="w-4 h-4"></i> Documents
            </button>

            <div class="mt-10">
                <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest ml-4 mb-3">Recent Activity</p>
                <div id="history-list" class="space-y-3 px-2"></div>
            </div>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col min-w-0 bg-[#0c0e12]">
        <header class="h-20 flex items-center justify-between px-8 border-b border-white/5">
            <h2 id="view-title" class="text-lg font-medium text-gray-300">All Files</h2>
            <div class="flex items-center gap-3">
                <button onclick="promptUrlUpload()" class="bg-white/5 hover:bg-white/10 border border-white/10 px-4 py-2.5 rounded-xl flex items-center gap-2 text-sm transition">
                    <i data-lucide="link" class="w-4 h-4"></i> URL Upload
                </button>
                <input type="file" id="file-upload" class="hidden" onchange="handleUpload()">
                <button onclick="document.getElementById('file-upload').click()" class="bg-blue-600 hover:bg-blue-700 px-6 py-2.5 rounded-xl flex items-center gap-2 text-sm font-semibold transition">
                    <i data-lucide="plus" class="w-4 h-4"></i> Upload
                </button>
            </div>
        </header>

        <section class="flex-1 overflow-y-auto p-8 custom-scrollbar">
            <div id="file-grid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6"></div>
        </section>
    </main>

    <div id="detail-view" class="fixed inset-0 z-50 glass hidden flex flex-col animate-up">
        <div class="p-6 border-b border-white/5 flex justify-between items-center">
            <button onclick="closeDetail()" class="flex items-center gap-2 text-gray-400 hover:text-white transition">
                <i data-lucide="chevron-left"></i> Back to Drive
            </button>
            <div id="detail-actions"></div>
        </div>
        <div class="flex-1 flex flex-col items-center justify-center p-12 overflow-hidden" id="preview-area">
            </div>
    </div>

    <div id="auth-screen" class="fixed inset-0 z-[200] bg-[#0c0e12] flex items-center justify-center p-6">
        <div class="glass p-10 rounded-[2.5rem] w-full max-w-md text-center">
            <h2 class="text-2xl font-bold mb-6">Forge Cloud Access</h2>
            <input type="password" id="auth-input" class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 mb-4 focus:border-blue-500 outline-none text-center" placeholder="Secret Key">
            <button onclick="authenticate()" class="w-full bg-blue-600 py-4 rounded-2xl font-bold">Connect</button>
        </div>
    </div>

    <script>
        const workerUrl = 'https://vicksgoli.visdrive.workers.dev'; // UPDATE THIS
        let allFiles = [];
        let currentFilter = 'all';

        const extMap = {
            video: ['mp4', 'mkv', 'webm', 'mov'],
            image: ['jpg', 'jpeg', 'png', 'gif', 'webp', 'svg'],
            document: ['pdf', 'doc', 'docx', 'txt', 'zip', 'rar']
        };

        function formatSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        async function loadFiles() {
            const secret = localStorage.getItem('forge_secret');
            try {
                const res = await fetch(`${workerUrl}/api/files`, { headers: {'Authorization': `Bearer ${secret}`} });
                allFiles = await res.json();
                render();
                renderHistory();
            } catch (e) { document.getElementById('auth-screen').classList.remove('hidden'); }
        }

        function render() {
            const grid = document.getElementById('file-grid');
            const filtered = allFiles.filter(f => {
                if (currentFilter === 'all') return true;
                const ext = f.name.split('.').pop().toLowerCase();
                return extMap[currentFilter].includes(ext);
            });

            grid.innerHTML = filtered.map(f => {
                const ext = f.name.split('.').pop().toLowerCase();
                let icon = 'file';
                if (extMap.video.includes(ext)) icon = 'play-circle';
                else if (extMap.image.includes(ext)) icon = 'image';
                else if (extMap.document.includes(ext)) icon = 'file-text';

                return `
                <div onclick="openFile('${f.name}')" class="glass group p-5 rounded-[2rem] cursor-pointer hover:bg-white/5 transition-all border border-transparent hover:border-blue-500/30 animate-up">
                    <div class="aspect-square mb-4 rounded-2xl bg-white/5 flex items-center justify-center">
                        <i data-lucide="${icon}" class="w-10 h-10 text-gray-600 group-hover:text-blue-500"></i>
                    </div>
                    <p class="text-sm font-medium truncate text-gray-200">${f.name}</p>
                    <p class="text-[10px] text-gray-500 mt-1 uppercase">${formatSize(f.size)}</p>
                </div>`;
            }).join('');
            lucide.createIcons();
        }

        function openFile(name) {
            const secret = localStorage.getItem('forge_secret');
            const url = `${workerUrl}/api/download/${encodeURIComponent(name)}?secret=${secret}`;
            const preview = document.getElementById('preview-area');
            const overlay = document.getElementById('detail-view');
            const ext = name.split('.').pop().toLowerCase();
            
            if (extMap.video.includes(ext)) {
                preview.innerHTML = `<video src="${url}" controls class="max-h-[70vh] w-full rounded-2xl shadow-2xl border border-white/10"></video>`;
            } else if (extMap.image.includes(ext)) {
                preview.innerHTML = `<img src="${url}" class="max-h-[70vh] rounded-2xl shadow-2xl border border-white/10" />`;
            } else {
                preview.innerHTML = `<div class="text-center"><i data-lucide="file-text" class="w-32 h-32 mb-6 text-gray-700"></i><p class="text-xl font-bold">${name}</p></div>`;
            }

            document.getElementById('detail-actions').innerHTML = `
                <button onclick="window.open('${url}')" class="bg-blue-600 hover:bg-blue-700 px-6 py-2 rounded-xl text-sm font-bold flex items-center gap-2">
                    <i data-lucide="download" class="w-4 h-4"></i> Download
                </button>
            `;
            overlay.classList.remove('hidden');
            lucide.createIcons();
        }

        function closeDetail() {
            document.getElementById('detail-view').classList.add('hidden');
            document.getElementById('preview-area').innerHTML = '';
        }

        async function promptUrlUpload() {
            const remoteUrl = prompt("Enter file direct link:");
            if (!remoteUrl) return;
            const fileName = prompt("Enter file name (e.g. movie.mp4):", "remote_file_" + Date.now().toString().slice(-4));
            if (!fileName) return;

            toast("Remote side-loading started...");
            const res = await fetch(`${workerUrl}/api/url-upload`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${localStorage.getItem('forge_secret')}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ remoteUrl, fileName })
            });

            if (res.ok) { toast('Success!', 'success'); addToHistory(fileName); loadFiles(); }
            else toast('Failed', 'error');
        }

        function setCategory(cat, btn) {
            currentFilter = cat;
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active'));
            btn.classList.add('nav-active');
            render();
        }

        function toast(msg, type='info') {
            const c = document.getElementById('toast-container');
            const t = document.createElement('div');
            t.className = `px-6 py-4 rounded-2xl glass border ${type==='error'?'border-red-500/50 text-red-400':'border-blue-500/50 text-blue-400'} animate-up`;
            t.innerText = msg;
            c.appendChild(t);
            setTimeout(() => t.remove(), 4000);
        }

        function addToHistory(name) {
            let history = JSON.parse(localStorage.getItem('forge_history') || '[]');
            history.unshift({ name, time: new Date().toLocaleTimeString() });
            localStorage.setItem('forge_history', JSON.stringify(history.slice(0, 5)));
            renderHistory();
        }

        function renderHistory() {
            const list = document.getElementById('history-list');
            const history = JSON.parse(localStorage.getItem('forge_history') || '[]');
            list.innerHTML = history.map(h => `<div class="pl-4 py-1 border-l-2 border-white/5"><p class="text-[11px] text-gray-300 truncate">${h.name}</p></div>`).join('');
        }

        async function handleUpload() {
            const file = document.getElementById('file-upload').files[0];
            if (!file) return;
            toast("Uploading...");
            const res = await fetch(`${workerUrl}/api/upload/${file.name}`, {
                method: 'PUT',
                headers: { 'Authorization': `Bearer ${localStorage.getItem('forge_secret')}`, 'Content-Type': file.type },
                body: file
            });
            if (res.ok) { toast('Complete!', 'success'); addToHistory(file.name); loadFiles(); }
        }

        function authenticate() { localStorage.setItem('forge_secret', document.getElementById('auth-input').value); document.getElementById('auth-screen').classList.add('hidden'); loadFiles(); }
        if (localStorage.getItem('forge_secret')) { document.getElementById('auth-screen').classList.add('hidden'); loadFiles(); }
        lucide.createIcons();
    </script>
</body>
</html>
